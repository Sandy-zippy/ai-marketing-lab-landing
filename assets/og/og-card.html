<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:1200px; height:630px; background:#071A14; overflow:hidden; }
body {
  position:relative;
  font-family:'JetBrains Mono', ui-monospace, Menlo, monospace;
  color:#F5F5F0;
  background-image:
    radial-gradient(ellipse 70% 50% at 20% -10%, rgba(0,255,148,0.10), transparent 60%),
    radial-gradient(ellipse 60% 60% at 110% 110%, rgba(0,255,148,0.07), transparent 60%),
    linear-gradient(180deg, #071A14 0%, #04110D 100%);
}
.grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(0,255,148,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,148,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events:none;
}
.card {
  position:relative;
  width:1200px; height:630px;
  padding: 60px 72px;
  display:flex; flex-direction:column; justify-content:space-between;
}
.top {
  display:flex; align-items:center; justify-content:space-between;
}
.brand {
  display:inline-flex; align-items:center; gap:12px;
  font-weight:700; font-size:18px; letter-spacing:0.06em;
  color:#F5F5F0; text-transform:uppercase;
}
.brand .cursor {
  width:12px; height:22px; background:#00FF94;
  display:inline-block;
}
.eyebrow {
  font-size:13px; letter-spacing:0.22em; text-transform:uppercase;
  color:#00FF94; font-weight:500;
  display:inline-flex; align-items:center; gap:12px;
}
.eyebrow .line { display:inline-block; width:28px; height:1px; background:#00FF94; }
.middle { flex:1; display:flex; flex-direction:column; justify-content:center; padding-top:8px; padding-bottom:8px; max-width:1056px; }
.headline {
  font-size: 60px;
  line-height: 1.04;
  letter-spacing: -0.02em;
  font-weight: 700;
  color: #F5F5F0;
  max-width: 1056px;
}
.headline .accent { color:#00FF94; }
.sub {
  margin-top: 28px;
  font-size: 20px;
  letter-spacing: 0.02em;
  color: #B0B4BD;
  font-weight: 500;
  line-height: 1.4;
  max-width: 880px;
}
.bottom {
  display:flex; align-items:flex-end; justify-content:space-between;
}
.stamp {
  display:inline-flex; align-items:center; gap:14px;
  padding: 14px 18px;
  border: 1px solid rgba(0,255,148,0.55);
  border-radius: 6px;
  background: rgba(0,255,148,0.06);
  font-size: 16px; letter-spacing: 0.18em; text-transform:uppercase;
  color:#00FF94; font-weight:700;
}
.stamp .dot {
  width:10px; height:10px; background:#00FF94; border-radius:50%;
  box-shadow: 0 0 12px #00FF94;
}
.term {
  display:inline-flex; align-items:center; gap:10px;
  font-size: 14px; letter-spacing: 0.14em;
  color: #6A6F78; text-transform:lowercase;
}
.term .blk { width:10px; height:18px; background:#00FF94; display:inline-block; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="card">
    <div class="top">
      <span class="brand">
        <span class="cursor"></span>
        <span>AI MARKETING LAB</span>
      </span>
      <span class="eyebrow"><span class="line"></span>OPERATOR AI, BUILT TO MEASURE</span>
    </div>

    <div class="middle">
      <h1 class="headline">How Indian operators are shipping AI agents that pay for themselves.<span class="accent">_</span></h1>
      <p class="sub">The operator's playbook for AI agents in business. Live builds every Wednesday. 9-agent fleet, open.</p>
    </div>

    <div class="bottom">
      <span class="stamp"><span class="dot"></span>WED, JUN 11 &middot; 8PM IST</span>
      <span class="term">hermes@aimarketinglab :: live <span class="blk"></span></span>
    </div>
  </div>
</body>
</html>
