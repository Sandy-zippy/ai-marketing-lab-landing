<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 1200" width="2400" height="1200" role="img" aria-label="Hermes 9-agent fleet diagram: Zayn orchestrator at center, 8 specialist agents in orbit">
  <defs>
    <style>
      @media (prefers-reduced-motion: reduce) {
        .hermes-pulses { display: none; }
        circle animate, circle animateMotion { display: none; }
      }
      .hermes-pulses circle { filter: drop-shadow(0 0 6px rgba(0,161,155,0.85)); }
    </style>
    <!-- Subtle background grid -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#F5F5F0" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <!-- Radial vignette behind hub -->
    <radialGradient id="hubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00A19B" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#00A19B" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00A19B" stop-opacity="0"/>
    </radialGradient>
    <!-- Arrowhead markers -->
    <marker id="arrowOut" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#008580" opacity="0.95"/>
    </marker>
    <marker id="arrowIn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#008580" opacity="0.55"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="2400" height="1200" fill="#0A0E0D"/>
  <rect width="2400" height="1200" fill="url(#grid)"/>

  <!-- Operator label, top-left -->
  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" fill="#F5F5F0">
    <text x="60" y="64" font-size="20" letter-spacing="3" font-weight="700">HERMES :: FLEET v1</text>
    <text x="60" y="92" font-size="14" letter-spacing="2" fill="#B0B8B4">9 AGENTS · ZAYN ORCHESTRATES · 8 SPECIALISTS IN ORBIT</text>
  </g>

  <!-- Live status top-right -->
  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" fill="#F5F5F0" text-anchor="end">
    <circle cx="2240" cy="58" r="6" fill="#008580"/>
    <text x="2260" y="64" font-size="18" letter-spacing="2" font-weight="700">LIVE</text>
    <text x="2340" y="92" font-size="14" letter-spacing="2" fill="#B0B8B4">2026-05-25 · IN PRODUCTION</text>
  </g>

  <!-- Hub glow -->
  <circle cx="1200" cy="600" r="520" fill="url(#hubGlow)"/>

  <!-- Orbit rings -->
  <circle cx="1200" cy="600" r="420" fill="none" stroke="#F5F5F0" stroke-width="1" stroke-dasharray="3 6" opacity="0.18"/>
  <circle cx="1200" cy="600" r="330" fill="none" stroke="#F5F5F0" stroke-width="1" stroke-dasharray="2 8" opacity="0.10"/>

  <!-- Connector lines (hub to each specialist) -->
  <g stroke="#008580" stroke-width="1.4" fill="none">
    <line x1="1200" y1="600" x2="1200" y2="180" opacity="0.7" marker-end="url(#arrowOut)"/>
    <line x1="1200" y1="600" x2="1497" y2="303" opacity="0.7" marker-end="url(#arrowOut)"/>
    <line x1="1200" y1="600" x2="1620" y2="600" opacity="0.7" marker-end="url(#arrowOut)"/>
    <line x1="1200" y1="600" x2="1497" y2="897" opacity="0.7" marker-end="url(#arrowOut)"/>
    <line x1="1200" y1="600" x2="1200" y2="1020" opacity="0.7" marker-end="url(#arrowOut)"/>
    <line x1="1200" y1="600" x2="903" y2="897" opacity="0.7" marker-end="url(#arrowOut)"/>
    <line x1="1200" y1="600" x2="780" y2="600" opacity="0.7" marker-end="url(#arrowOut)"/>
    <line x1="1200" y1="600" x2="903" y2="303" opacity="0.7" marker-end="url(#arrowOut)"/>

    <!-- Return arrows -->
    <path d="M 1224 184 Q 1260 400 1224 596" stroke-dasharray="3 5" opacity="0.42" marker-end="url(#arrowIn)"/>
    <path d="M 1517 327 Q 1380 460 1224 600" stroke-dasharray="3 5" opacity="0.42" marker-end="url(#arrowIn)"/>
    <path d="M 1624 624 Q 1400 660 1224 624" stroke-dasharray="3 5" opacity="0.42" marker-end="url(#arrowIn)"/>
    <path d="M 1517 873 Q 1380 740 1224 604" stroke-dasharray="3 5" opacity="0.42" marker-end="url(#arrowIn)"/>
    <path d="M 1176 1016 Q 1140 800 1176 604" stroke-dasharray="3 5" opacity="0.42" marker-end="url(#arrowIn)"/>
    <path d="M 883 873 Q 1020 740 1176 604" stroke-dasharray="3 5" opacity="0.42" marker-end="url(#arrowIn)"/>
    <path d="M 776 576 Q 1000 540 1176 576" stroke-dasharray="3 5" opacity="0.42" marker-end="url(#arrowIn)"/>
    <path d="M 883 327 Q 1020 460 1176 596" stroke-dasharray="3 5" opacity="0.42" marker-end="url(#arrowIn)"/>
  </g>

  <!-- Animated traveling pulses along each dispatch line (Zayn → specialist outward, alternating with specialist → Zayn inward) -->
  <!-- Each orb: 2.4s cycle, staggered begin so the fleet pulses in a wave -->
  <g class="hermes-pulses">
    <!-- N — Mira: outward then inward -->
    <circle r="9" fill="#00A19B" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="0s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="0s" repeatCount="indefinite" path="M 1200 600 L 1200 180"/>
    </circle>
    <circle r="7" fill="#008580" opacity="0">
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="1.2s" repeatCount="indefinite" path="M 1224 184 Q 1260 400 1224 596"/>
    </circle>

    <!-- NE — Kai -->
    <circle r="9" fill="#00A19B" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="0.175s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="0.175s" repeatCount="indefinite" path="M 1200 600 L 1497 303"/>
    </circle>
    <circle r="7" fill="#008580" opacity="0">
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="1.375s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="1.375s" repeatCount="indefinite" path="M 1517 327 Q 1380 460 1224 600"/>
    </circle>

    <!-- E — Axel -->
    <circle r="9" fill="#00A19B" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="0.35s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="0.35s" repeatCount="indefinite" path="M 1200 600 L 1620 600"/>
    </circle>
    <circle r="7" fill="#008580" opacity="0">
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="1.55s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="1.55s" repeatCount="indefinite" path="M 1624 624 Q 1400 660 1224 624"/>
    </circle>

    <!-- SE — Iris -->
    <circle r="9" fill="#00A19B" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="0.525s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="0.525s" repeatCount="indefinite" path="M 1200 600 L 1497 897"/>
    </circle>
    <circle r="7" fill="#008580" opacity="0">
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="1.725s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="1.725s" repeatCount="indefinite" path="M 1517 873 Q 1380 740 1224 604"/>
    </circle>

    <!-- S — Otto -->
    <circle r="9" fill="#00A19B" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="0.7s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="0.7s" repeatCount="indefinite" path="M 1200 600 L 1200 1020"/>
    </circle>
    <circle r="7" fill="#008580" opacity="0">
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="1.9s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="1.9s" repeatCount="indefinite" path="M 1176 1016 Q 1140 800 1176 604"/>
    </circle>

    <!-- SW — Skye -->
    <circle r="9" fill="#00A19B" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="0.875s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="0.875s" repeatCount="indefinite" path="M 1200 600 L 903 897"/>
    </circle>
    <circle r="7" fill="#008580" opacity="0">
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="2.075s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="2.075s" repeatCount="indefinite" path="M 883 873 Q 1020 740 1176 604"/>
    </circle>

    <!-- W — Vera -->
    <circle r="9" fill="#00A19B" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="1.05s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="1.05s" repeatCount="indefinite" path="M 1200 600 L 780 600"/>
    </circle>
    <circle r="7" fill="#008580" opacity="0">
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="0.25s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="0.25s" repeatCount="indefinite" path="M 776 576 Q 1000 540 1176 576"/>
    </circle>

    <!-- NW — Atlas -->
    <circle r="9" fill="#00A19B" opacity="0">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="1.225s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="1.225s" repeatCount="indefinite" path="M 1200 600 L 903 303"/>
    </circle>
    <circle r="7" fill="#008580" opacity="0">
      <animate attributeName="opacity" values="0;0.85;0.85;0" keyTimes="0;0.1;0.9;1" dur="2.4s" begin="0.425s" repeatCount="indefinite"/>
      <animateMotion dur="2.4s" begin="0.425s" repeatCount="indefinite" path="M 883 327 Q 1020 460 1176 596"/>
    </circle>
  </g>

  <!-- Specialist nodes -->
  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" text-anchor="middle">

    <!-- N — Mira -->
    <g>
      <circle cx="1200" cy="180" r="78" fill="#13191B" stroke="#F5F5F0" stroke-width="2"/>
      <text x="1200" y="178" font-size="28" font-weight="700" fill="#F5F5F0">MIRA</text>
      <text x="1200" y="208" font-size="13" fill="#B0B8B4" letter-spacing="1.5">MEMORY</text>
    </g>

    <!-- NE — Kai -->
    <g>
      <circle cx="1497" cy="303" r="78" fill="#13191B" stroke="#F5F5F0" stroke-width="2"/>
      <text x="1497" y="301" font-size="28" font-weight="700" fill="#F5F5F0">KAI</text>
      <text x="1497" y="331" font-size="13" fill="#B0B8B4" letter-spacing="1.5">OUTREACH</text>
    </g>

    <!-- E — Axel -->
    <g>
      <circle cx="1620" cy="600" r="78" fill="#13191B" stroke="#F5F5F0" stroke-width="2"/>
      <text x="1620" y="598" font-size="28" font-weight="700" fill="#F5F5F0">AXEL</text>
      <text x="1620" y="628" font-size="13" fill="#B0B8B4" letter-spacing="1.5">PAID MEDIA</text>
    </g>

    <!-- SE — Iris -->
    <g>
      <circle cx="1497" cy="897" r="78" fill="#13191B" stroke="#F5F5F0" stroke-width="2"/>
      <text x="1497" y="895" font-size="28" font-weight="700" fill="#F5F5F0">IRIS</text>
      <text x="1497" y="925" font-size="13" fill="#B0B8B4" letter-spacing="1.5">CREATIVE</text>
    </g>

    <!-- S — Otto -->
    <g>
      <circle cx="1200" cy="1020" r="78" fill="#13191B" stroke="#F5F5F0" stroke-width="2"/>
      <text x="1200" y="1018" font-size="28" font-weight="700" fill="#F5F5F0">OTTO</text>
      <text x="1200" y="1048" font-size="13" fill="#B0B8B4" letter-spacing="1.5">OPS ENG</text>
    </g>

    <!-- SW — Skye -->
    <g>
      <circle cx="903" cy="897" r="78" fill="#13191B" stroke="#F5F5F0" stroke-width="2"/>
      <text x="903" y="895" font-size="28" font-weight="700" fill="#F5F5F0">SKYE</text>
      <text x="903" y="925" font-size="13" fill="#B0B8B4" letter-spacing="1.5">RESEARCH</text>
    </g>

    <!-- W — Vera -->
    <g>
      <circle cx="780" cy="600" r="78" fill="#13191B" stroke="#F5F5F0" stroke-width="2"/>
      <text x="780" y="598" font-size="28" font-weight="700" fill="#F5F5F0">VERA</text>
      <text x="780" y="628" font-size="13" fill="#B0B8B4" letter-spacing="1.5">QA REVIEW</text>
    </g>

    <!-- NW — Atlas -->
    <g>
      <circle cx="903" cy="303" r="78" fill="#13191B" stroke="#F5F5F0" stroke-width="2"/>
      <text x="903" y="301" font-size="28" font-weight="700" fill="#F5F5F0">ATLAS</text>
      <text x="903" y="331" font-size="13" fill="#B0B8B4" letter-spacing="1.5">STRATEGY</text>
    </g>

    <!-- Center — Zayn (orchestrator, lime fill) with pulse animation -->
    <g>
      <circle cx="1200" cy="600" r="138" fill="none" stroke="#008580" stroke-width="2" opacity="0.55">
        <animate attributeName="r" values="138;156;138" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.55;0.15;0.55" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1200" cy="600" r="124" fill="#00A19B" stroke="#F5F5F0" stroke-width="3"/>
      <text x="1200" y="588" font-size="40" font-weight="700" fill="#F5F5F0" letter-spacing="1">ZAYN</text>
      <text x="1200" y="618" font-size="13" fill="#F5F5F0" letter-spacing="3" font-weight="700">ORCHESTRATOR</text>
      <text x="1200" y="640" font-size="11" fill="#F5F5F0" letter-spacing="2" opacity="0.75">CHIEF OF STAFF</text>
    </g>
  </g>

  <!-- Legend bottom-left -->
  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" font-size="12" letter-spacing="1.5" fill="#B0B8B4">
    <line x1="60" y1="1080" x2="120" y2="1080" stroke="#008580" stroke-width="1.4" opacity="0.7" marker-end="url(#arrowOut)"/>
    <text x="132" y="1085">DISPATCH</text>

    <line x1="280" y1="1080" x2="340" y2="1080" stroke="#008580" stroke-width="1.4" stroke-dasharray="3 5" opacity="0.55" marker-end="url(#arrowIn)"/>
    <text x="352" y="1085">REPORT BACK</text>
  </g>

  <!-- Stats bottom-right -->
  <g font-family="'JetBrains Mono', ui-monospace, Menlo, monospace" text-anchor="end">
    <text x="2340" y="1080" font-size="13" letter-spacing="2" fill="#B0B8B4">36 SKILLS · 52 SOPs · CRON-DRIVEN · TELEGRAM INTERFACE</text>
    <text x="2340" y="1110" font-size="13" letter-spacing="2" fill="#B0B8B4">VPS · HOSTINGER KVM2 · CODEX OAUTH + OPENROUTER FALLBACK</text>
  </g>
</svg>
