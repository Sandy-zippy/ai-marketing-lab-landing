<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" fill="none">
  <!-- 3 angular strokes converging to a focal point -->
  <g transform="translate(40, 40)" stroke="#00A19B" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -22 -20 L -2 0 L -22 20"/>
    <path d="M -10 -26 L 2 0 L -10 26"/>
    <path d="M 22 0 L 4 0"/>
  </g>
  <!-- Focal-point dot -->
  <circle cx="42" cy="40" r="2.4" fill="#00A19B"/>
  <!-- Wordmark -->
  <text x="92" y="48" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" font-weight="500" fill="#F5F5F0" letter-spacing="0.06em">OPEN CLAW</text>
</svg>
