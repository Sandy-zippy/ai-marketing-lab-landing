<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" role="img" aria-label="Hermes">
  <title>Hermes</title>
  <!-- Glyph: cluster of 4 connected agent nodes, neon green -->
  <g fill="#00FF94" stroke="#00FF94" stroke-width="1.5">
    <!-- Connection lines first (under nodes) -->
    <line x1="14" y1="20" x2="32" y2="20" stroke-width="1.5" stroke-opacity="0.55"/>
    <line x1="14" y1="20" x2="14" y2="40" stroke-width="1.5" stroke-opacity="0.55"/>
    <line x1="32" y1="20" x2="32" y2="40" stroke-width="1.5" stroke-opacity="0.55"/>
    <line x1="14" y1="40" x2="32" y2="40" stroke-width="1.5" stroke-opacity="0.55"/>
    <line x1="14" y1="20" x2="32" y2="40" stroke-width="1" stroke-opacity="0.35"/>
    <line x1="32" y1="20" x2="14" y2="40" stroke-width="1" stroke-opacity="0.35"/>
    <!-- Nodes -->
    <circle cx="14" cy="20" r="3.5" stroke="none"/>
    <circle cx="32" cy="20" r="3.5" stroke="none"/>
    <circle cx="14" cy="40" r="3.5" stroke="none"/>
    <circle cx="32" cy="40" r="3.5" stroke="none"/>
  </g>
  <!-- Wordmark: "Hermes" in JetBrains Mono, off-white -->
  <text x="54" y="38"
        font-family="'JetBrains Mono', ui-monospace, Menlo, monospace"
        font-size="22" font-weight="500" letter-spacing="0.5"
        fill="#F5F5F0">Hermes</text>
  <!-- Terminal cursor accent after wordmark -->
  <rect x="172" y="20" width="3" height="22" fill="#00FF94"/>
</svg>
