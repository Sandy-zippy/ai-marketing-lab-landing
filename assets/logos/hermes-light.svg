<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" role="img" aria-label="Hermes">
  <title>Hermes</title>
  <!-- Glyph: H verticals with italic forward lean + 5 agent dots -->
  <line x1="14" y1="14" x2="10" y2="46" stroke="#00A19B" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="14" x2="34" y2="46" stroke="#00A19B" stroke-width="3" stroke-linecap="round"/>
  <circle cx="16" cy="30" r="2.2" fill="#00A19B"/>
  <circle cx="20.5" cy="30" r="2.2" fill="#00A19B"/>
  <circle cx="25" cy="30" r="2.2" fill="#00A19B"/>
  <circle cx="29.5" cy="30" r="2.2" fill="#00A19B"/>
  <circle cx="34" cy="30" r="2.2" fill="#00A19B"/>
  <!-- Wordmark: "Hermes" in JetBrains Mono, off-white -->
  <text x="54" y="38"
        font-family="'JetBrains Mono', ui-monospace, Menlo, monospace"
        font-size="22" font-weight="500" letter-spacing="0.5"
        fill="#F5F5F0">Hermes</text>
  <!-- Terminal cursor accent after wordmark -->
  <rect x="172" y="20" width="3" height="22" fill="#00A19B"/>
</svg>
