<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer ring (the 'g' loop) -->
  <circle cx="16" cy="16" r="14" stroke="#F5F5F0" stroke-width="1.5"/>
  <!-- Neural cluster connections -->
  <line x1="11" y1="12" x2="16" y2="20" stroke="#00A19B" stroke-width="1" opacity="0.5"/>
  <line x1="21" y1="12" x2="16" y2="20" stroke="#00A19B" stroke-width="1" opacity="0.5"/>
  <line x1="11" y1="12" x2="21" y2="12" stroke="#00A19B" stroke-width="1" opacity="0.3"/>
  <line x1="11" y1="22" x2="21" y2="22" stroke="#00A19B" stroke-width="1" opacity="0.3"/>
  <line x1="11" y1="22" x2="16" y2="20" stroke="#00A19B" stroke-width="0.8" opacity="0.35"/>
  <line x1="21" y1="22" x2="16" y2="20" stroke="#00A19B" stroke-width="0.8" opacity="0.35"/>
  <!-- Nodes -->
  <circle cx="11" cy="12" r="1.8" fill="#00A19B"/>
  <circle cx="21" cy="12" r="1.8" fill="#00A19B"/>
  <circle cx="16" cy="20" r="1.8" fill="#00A19B"/>
  <circle cx="11" cy="22" r="1.5" fill="#00A19B" opacity="0.7"/>
  <circle cx="21" cy="22" r="1.5" fill="#00A19B" opacity="0.7"/>
</svg>
